<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>년도별 유행 음식 이상형 월드컵 | 그때 그 유행 간식</title>
  <meta name="description" content="허니버터칩, 슈니발렌, 탕후루, 두바이초콜릿... 2000년대부터 2020년대까지 유행했던 음식으로 이상형 월드컵. 그때 그 시절 최애를 뽑아보세요." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Malgun Gothic", sans-serif; background: #f4f5f7; color: #222; line-height: 1.5; padding: 16px; }
    .wrap { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 12px 0 4px; text-align: center; }
    .round { text-align: center; color: #4a7cff; font-weight: 700; font-size: 16px; margin: 8px 0 16px; }
    .vs { text-align: center; color: #bbb; font-weight: 800; margin: 10px 0; font-size: 18px; }
    .pick {
      background: #fff; border-radius: 16px; padding: 28px 16px; text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); cursor: pointer; transition: transform .08s;
    }
    .pick:active { transform: scale(.97); }
    .pick .emoji { font-size: 60px; }
    .pick .name { font-size: 22px; font-weight: 700; margin-top: 8px; }
    .pick .era { font-size: 13px; color: #f0932b; font-weight: 600; margin-top: 4px; }
    .champion { background: #fff; border-radius: 16px; padding: 40px 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .champion .crown { font-size: 40px; }
    .champion .emoji { font-size: 80px; margin: 8px 0; }
    .champion .name { font-size: 28px; font-weight: 800; }
    .champion .era { font-size: 15px; color: #f0932b; font-weight: 600; margin-top: 4px; }
    .champion .label { color: #888; margin-top: 6px; }
    button { width: 100%; padding: 14px; margin-top: 12px; font-size: 16px; font-weight: 700; color: #fff; background: #4a7cff; border: none; border-radius: 10px; cursor: pointer; }
    button.share { background: #22a06b; }
    .home { color:#888; text-decoration:none; font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p style="margin-bottom:8px"><a class="home" href="../../">← 툴 모음 홈</a></p>
    <h1>🕰️ 년도별 유행 음식 월드컵</h1>
    <div class="round" id="round"></div>

    <!-- 카카오 애드핏 광고 -->
    <div style="text-align:center;margin:0 0 16px">
      <ins class="kakao_ad_area" style="display:none;"
           data-ad-unit="DAN-tmpthnakjXKM6v71"
           data-ad-width="320"
           data-ad-height="100"></ins>
      <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
    </div>

    <div id="game"></div>
  </div>

<script>
const CANDIDATES = [
  { name: "안동찜닭", emoji: "🍗", era: "2000년대" },
  { name: "불닭", emoji: "🌶️", era: "2000년대" },
  { name: "크리스피크림", emoji: "🍩", era: "2000년대" },
  { name: "붕어싸만코", emoji: "🐟", era: "2000년대" },
  { name: "죠스바", emoji: "🧊", era: "2000년대" },
  { name: "딸기 셰이크", emoji: "🍓", era: "2000년대" },
  { name: "벌집 아이스크림", emoji: "🍦", era: "2010년대" },
  { name: "허니버터칩", emoji: "🥔", era: "2010년대" },
  { name: "슈니발렌", emoji: "🔨", era: "2010년대" },
  { name: "치즈등갈비", emoji: "🧀", era: "2010년대" },
  { name: "대왕 카스테라", emoji: "🍰", era: "2010년대" },
  { name: "흑당 버블티", emoji: "🧋", era: "2010년대" },
  { name: "뚱카롱", emoji: "🌈", era: "2010년대" },
  { name: "로제떡볶이", emoji: "🌶️", era: "2010년대" },
  { name: "마약옥수수", emoji: "🌽", era: "2010년대" },
  { name: "설빙 팥빙수", emoji: "🍧", era: "2010년대" },
  { name: "츄러스", emoji: "🥨", era: "2010년대" },
  { name: "대만 지파이", emoji: "🍗", era: "2010년대" },
  { name: "회오리감자", emoji: "🌀", era: "2010년대" },
  { name: "탕후루", emoji: "🍡", era: "2020년대" },
  { name: "두바이 초콜릿", emoji: "🍫", era: "2020년대" },
  { name: "요아정", emoji: "🍦", era: "2020년대" },
  { name: "마라탕", emoji: "🍲", era: "2020년대" },
  { name: "크로플", emoji: "🧇", era: "2020년대" },
  { name: "약과", emoji: "🍪", era: "2020년대" },
  { name: "밤 티라미수", emoji: "🌰", era: "2020년대" },
  { name: "크루키", emoji: "🥐", era: "2020년대" },
  { name: "먹태깡", emoji: "🥔", era: "2020년대" },
  { name: "뿌링클", emoji: "🍗", era: "2020년대" },
  { name: "소금빵", emoji: "🥖", era: "2020년대" },
  { name: "로투스 쿠키", emoji: "🍪", era: "2020년대" },
  { name: "딸기 모찌", emoji: "🍡", era: "2020년대" },
];

let round, next, idx;

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function roundName(n) {
  if (n >= 32) return "32강";
  if (n === 16) return "16강";
  if (n === 8) return "8강";
  if (n === 4) return "4강";
  if (n === 2) return "결승";
  return "";
}

function start() {
  round = shuffle([...CANDIDATES]);
  next = [];
  idx = 0;
  render();
}

function pick(winner) {
  next.push(winner);
  idx += 2;
  if (idx >= round.length) {
    round = next;
    next = [];
    idx = 0;
  }
  render();
}

function render() {
  const game = document.getElementById("game");
  const roundEl = document.getElementById("round");

  if (round.length === 1) {
    const c = round[0];
    roundEl.textContent = "우승!";
    game.innerHTML = `
      <div class="champion">
        <div class="crown">👑</div>
        <div class="emoji">${c.emoji}</div>
        <div class="name">${c.name}</div>
        <div class="era">${c.era} 유행</div>
        <div class="label">당신이 뽑은 최고의 유행 음식</div>
      </div>
      <button onclick="start()">🔄 다시 하기</button>
      <button class="share" onclick="share('${c.name}')">📤 결과 공유하기</button>
    `;
    return;
  }

  roundEl.textContent = `${roundName(round.length)} (${idx / 2 + 1} / ${round.length / 2})`;
  const a = round[idx], b = round[idx + 1];
  game.innerHTML = `
    <div class="pick" onclick="pick(round[idx])">
      <div class="emoji">${a.emoji}</div><div class="name">${a.name}</div><div class="era">${a.era}</div>
    </div>
    <div class="vs">VS</div>
    <div class="pick" onclick="pick(round[idx+1])">
      <div class="emoji">${b.emoji}</div><div class="name">${b.name}</div><div class="era">${b.era}</div>
    </div>
  `;
}

window.pick = pick;
window.start = start;
window.share = async function (name) {
  const text = `내 최애 유행 음식은 "${name}"! 너도 해봐 👉`;
  const url = location.href;
  // 1) 네이티브 공유 (주로 모바일)
  if (navigator.share) {
    try {
      await navigator.share({ title: "년도별 유행 음식 월드컵", text, url });
      return;
    } catch (e) {
      if (e.name === "AbortError") return; // 사용자가 취소한 것 = 정상
    }
  }
  // 2) 클립보드 복사 (주로 PC)
  try {
    await navigator.clipboard.writeText(text + " " + url);
    alert("결과 링크가 복사됐어요! 붙여넣기로 공유하세요.");
    return;
  } catch (e) {}
  // 3) 최후: 링크 직접 표시
  prompt("아래 링크를 복사해서 공유하세요:", text + " " + url);
};

start();
</script>
</body>
</html>
