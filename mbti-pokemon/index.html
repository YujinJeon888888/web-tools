<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포켓몬 MBTI 테스트 | 내 성격은 어떤 포켓몬?</title>
  <meta name="description" content="12개 질문으로 알아보는 나의 포켓몬 MBTI. 피카츄? 뮤츠? 이브이? 내 성격에 맞는 포켓몬을 찾아보세요." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Malgun Gothic", sans-serif; background: #f4f5f7; color: #222; line-height: 1.5; padding: 16px; }
    .wrap { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 12px 0 4px; text-align: center; }
    .sub { color: #888; font-size: 13px; text-align: center; margin-bottom: 16px; }
    .bar { height: 6px; background: #e5e8ef; border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
    .bar > div { height: 100%; background: #4a7cff; width: 0; transition: width .2s; }
    .q { background:#fff; border-radius:14px; padding:24px 16px; box-shadow:0 1px 4px rgba(0,0,0,.06); text-align:center; }
    .q .num { color:#4a7cff; font-weight:700; font-size:14px; }
    .q .text { font-size:18px; font-weight:700; margin:10px 0 20px; }
    .opt { display:block; width:100%; padding:16px; margin-bottom:12px; font-size:16px; font-weight:600;
           background:#f4f7ff; color:#333; border:1.5px solid #dde5ff; border-radius:10px; cursor:pointer; }
    .opt:active { background:#4a7cff; color:#fff; }
    .result { background:#fff; border-radius:16px; padding:32px 16px; box-shadow:0 1px 4px rgba(0,0,0,.06); text-align:center; }
    .result .emoji { font-size:76px; }
    .result .type { color:#4a7cff; font-weight:800; font-size:16px; margin-top:8px; letter-spacing:1px; }
    .result .name { font-size:30px; font-weight:800; margin-top:2px; }
    .result .desc { color:#666; font-size:15px; margin-top:10px; }
    button { width:100%; padding:14px; margin-top:12px; font-size:16px; font-weight:700; color:#fff; background:#4a7cff; border:none; border-radius:10px; cursor:pointer; }
    button.share { background:#22a06b; }
    .home { color:#888; text-decoration:none; font-size:13px; }
  </style>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="포켓몬 MBTI 테스트" />
  <meta property="og:description" content="내 성격은 어떤 포켓몬? 12문항으로 알아보는 나의 포켓몬 MBTI. 피카츄·뮤츠·이브이·갸라도스…" />
  <meta property="og:url" content="https://yujinjeon888888.github.io/web-tools/mbti-pokemon/" />
</head>
<body>
  <div class="wrap">
    <p style="margin-bottom:8px"><a class="home" href="../">← 툴 모음 홈</a></p>
    <h1>⚡ 포켓몬 MBTI 테스트</h1>
    <p class="sub">12개 질문으로 알아보는 내 포켓몬</p>

    <!-- 카카오 애드핏 광고 -->
    <div style="text-align:center;margin:0 0 16px">
      <ins class="kakao_ad_area" style="display:none;"
           data-ad-unit="DAN-tmpthnakjXKM6v71"
           data-ad-width="320"
           data-ad-height="100"></ins>
      <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
    </div>

    <div class="bar"><div id="bar"></div></div>
    <div id="app"></div>
  </div>

<script>
const Q = [
  { text: "주말에 갑자기 번개 모임 연락!", a: ["좋아 바로 나감", "E"], b: ["오늘은 집이 최고", "I"] },
  { text: "처음 보는 사람들 사이에서 나는", a: ["내가 먼저 말 검", "E"], b: ["말 걸어주길 기다림", "I"] },
  { text: "에너지 충전 방법은?", a: ["사람들과 왁자지껄", "E"], b: ["혼자만의 시간", "I"] },
  { text: "새 물건을 사면", a: ["설명서대로 바로 씀", "S"], b: ["이걸로 뭘 할까 상상", "N"] },
  { text: "내 대화 스타일은", a: ["구체적인 사실 위주", "S"], b: ["아이디어와 가능성", "N"] },
  { text: "목적지로 갈 때", a: ["늘 다니던 익숙한 길", "S"], b: ["새로운 길 탐험", "N"] },
  { text: "친구가 고민을 털어놓으면", a: ["해결책부터 제시", "T"], b: ["일단 공감해줌", "F"] },
  { text: "결정할 때 더 중요한 건", a: ["논리와 효율", "T"], b: ["사람과 감정", "F"] },
  { text: "지적을 받으면", a: ["맞는 말인지 따져봄", "T"], b: ["기분부터 상함", "F"] },
  { text: "여행 스타일은?", a: ["계획을 완벽히 짜둠", "J"], b: ["발길 닿는 대로", "P"] },
  { text: "할 일이 생기면", a: ["미리미리 끝냄", "J"], b: ["마감 직전 폭발", "P"] },
  { text: "내 방과 책상은", a: ["늘 정리정돈", "J"], b: ["어수선해도 편함", "P"] },
];

const POKEMON = {
  ISTJ: { name:"롱스톤", emoji:"🪨", desc:"원칙과 책임의 바위. 한번 정하면 끝까지 밀고 감." },
  ISFJ: { name:"럭키", emoji:"💗", desc:"헌신적인 힐러. 조용히 주변을 다 챙김." },
  INFJ: { name:"뮤", emoji:"✨", desc:"신비로운 이상주의자. 남다른 통찰의 소유자." },
  INTJ: { name:"뮤츠", emoji:"🧠", desc:"냉철한 전략가. 늘 큰 그림을 그림." },
  ISTP: { name:"스라크", emoji:"⚔️", desc:"과묵한 실력파. 말보다 손으로 증명." },
  ISFP: { name:"이브이", emoji:"🐾", desc:"자유로운 예술가. 무한한 가능성의 소유자." },
  INFP: { name:"푸린", emoji:"🎤", desc:"감성 몽상가. 마음을 노래하는 타입." },
  INTP: { name:"메타몽", emoji:"🔮", desc:"호기심 변신가. 뭐든 끝까지 파고듦." },
  ESTP: { name:"리자몽", emoji:"🔥", desc:"거침없는 모험가. 지금 이 순간을 삼." },
  ESFP: { name:"피카츄", emoji:"⚡", desc:"타고난 인기스타. 어디서나 반짝반짝." },
  ENFP: { name:"이상해씨", emoji:"🌱", desc:"열정 가득 자유인. 새 씨앗을 뿌림." },
  ENTP: { name:"겟코우가", emoji:"🥷", desc:"재치 넘치는 전략가. 판을 흔드는 타입." },
  ESTJ: { name:"거북왕", emoji:"🛡️", desc:"타고난 리더. 든든하게 판을 관리함." },
  ESFJ: { name:"해피너스", emoji:"💞", desc:"다정한 조력자. 분위기 메이커." },
  ENFJ: { name:"가디안", emoji:"🌟", desc:"카리스마 멘토. 사람을 이끄는 힘." },
  ENTJ: { name:"갸라도스", emoji:"🐉", desc:"압도적 리더. 목표를 향해 돌진." },
};

let step = 0;
const score = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

function render() {
  const app = document.getElementById("app");
  document.getElementById("bar").style.width = (step / Q.length * 100) + "%";

  if (step >= Q.length) { showResult(); return; }

  const q = Q[step];
  app.innerHTML = `
    <div class="q">
      <div class="num">Q${step + 1} / ${Q.length}</div>
      <div class="text">${q.text}</div>
      <button class="opt" onclick="answer('${q.a[1]}')">${q.a[0]}</button>
      <button class="opt" onclick="answer('${q.b[1]}')">${q.b[0]}</button>
    </div>
  `;
}

function answer(letter) {
  score[letter]++;
  step++;
  render();
}

function showResult() {
  document.getElementById("bar").style.width = "100%";
  const type =
    (score.E >= score.I ? "E" : "I") +
    (score.S >= score.N ? "S" : "N") +
    (score.T >= score.F ? "T" : "F") +
    (score.J >= score.P ? "J" : "P");
  const p = POKEMON[type];
  document.getElementById("app").innerHTML = `
    <div class="result">
      <div class="emoji">${p.emoji}</div>
      <div class="type">${type}</div>
      <div class="name">${p.name}</div>
      <div class="desc">${p.desc}</div>
    </div>
    <button onclick="restart()">🔄 다시 하기</button>
    <button class="share" onclick="share('${type}', '${p.name}')">📤 결과 공유하기</button>
  `;
}

function restart() {
  step = 0;
  for (const k in score) score[k] = 0;
  render();
}

window.answer = answer;
window.restart = restart;
window.share = async function (type, name) {
  const text = `내 포켓몬 MBTI는 ${type} "${name}"! 너도 해봐 👉`;
  const url = location.href;
  if (navigator.share) {
    try { await navigator.share({ title: "포켓몬 MBTI 테스트", text, url }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  try {
    await navigator.clipboard.writeText(text + " " + url);
    alert("결과 링크가 복사됐어요! 붙여넣기로 공유하세요.");
    return;
  } catch (e) {}
  prompt("아래 링크를 복사해서 공유하세요:", text + " " + url);
};

render();
</script>
</body>
</html>
